<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- warm near-black background, tinted toward the ember hue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241a13"/>
      <stop offset="0.55" stop-color="#160f0a"/>
      <stop offset="1" stop-color="#0c0907"/>
    </linearGradient>
    <!-- warm glow behind the batons -->
    <radialGradient id="glow" cx="0.56" cy="0.46" r="0.6">
      <stop offset="0" stop-color="#ff7a33" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#c43c16" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- rear baton: deep ember (the runner behind) -->
    <linearGradient id="ember" x1="300" y1="760" x2="560" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a8300f"/>
      <stop offset="1" stop-color="#d8451c"/>
    </linearGradient>
    <!-- front baton: bright amber (the runner ahead) -->
    <linearGradient id="amber" x1="470" y1="740" x2="760" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6a2a"/>
      <stop offset="0.55" stop-color="#ff8d3e"/>
      <stop offset="1" stop-color="#ffb15a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- squircle-ish rounded background with a small transparent margin -->
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#glow)"/>
  <!-- subtle inner top highlight for depth -->
  <rect x="64" y="64" width="896" height="896" rx="208" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <g filter="url(#soft)">
    <!-- rear baton (deep ember) -->
    <line x1="312" y1="724" x2="556" y2="338" stroke="url(#ember)" stroke-width="132" stroke-linecap="round"/>
    <!-- front baton (bright amber), offset up-and-right to form the "//" / the pass -->
    <line x1="486" y1="700" x2="730" y2="314" stroke="url(#amber)" stroke-width="132" stroke-linecap="round"/>
  </g>

  <!-- spark at the leading tip of the front baton: the moment of the hand-off -->
  <circle cx="730" cy="314" r="30" fill="#fff3e4"/>
  <circle cx="730" cy="314" r="58" fill="#ffd9b0" opacity="0.28"/>

  <!-- faint highlight along the front baton for a polished, dimensional read -->
  <line x1="500" y1="678" x2="716" y2="336" stroke="#ffffff" stroke-opacity="0.18" stroke-width="14" stroke-linecap="round"/>
</svg>
