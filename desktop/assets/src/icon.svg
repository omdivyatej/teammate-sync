<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- neutral charcoal background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1f24"/>
      <stop offset="0.55" stop-color="#141519"/>
      <stop offset="1" stop-color="#0d0d10"/>
    </linearGradient>
    <!-- cool glow behind the batons (lime-leaning) -->
    <radialGradient id="glow" cx="0.56" cy="0.46" r="0.62">
      <stop offset="0" stop-color="#c6f23f" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#4263ff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- rear baton: cobalt blue (the runner behind) -->
    <linearGradient id="blue" x1="300" y1="760" x2="560" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f49d8"/>
      <stop offset="1" stop-color="#4f6dff"/>
    </linearGradient>
    <!-- front baton: electric lime (the runner ahead) -->
    <linearGradient id="lime" x1="470" y1="740" x2="760" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#aee23a"/>
      <stop offset="0.55" stop-color="#c6f23f"/>
      <stop offset="1" stop-color="#dcff6a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#glow)"/>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <g filter="url(#soft)">
    <!-- rear baton (cobalt) -->
    <line x1="312" y1="724" x2="556" y2="338" stroke="url(#blue)" stroke-width="132" stroke-linecap="round"/>
    <!-- front baton (lime), offset up-and-right: the pass -->
    <line x1="486" y1="700" x2="730" y2="314" stroke="url(#lime)" stroke-width="132" stroke-linecap="round"/>
  </g>

  <!-- spark at the leading tip: the moment of the hand-off -->
  <circle cx="730" cy="314" r="30" fill="#f4ffd6"/>
  <circle cx="730" cy="314" r="58" fill="#dcff6a" opacity="0.30"/>

  <!-- subtle highlight along the lime baton -->
  <line x1="500" y1="678" x2="716" y2="336" stroke="#ffffff" stroke-opacity="0.20" stroke-width="14" stroke-linecap="round"/>
</svg>
