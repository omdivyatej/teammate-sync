# fly.toml app configuration file generated for teammate-sync-backend on 2026-06-13T22:07:47+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'teammate-sync-backend'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

# Persistent SQLite storage. Survives machine restarts + scale-to-zero.
# 1GB free tier — plenty for tens of teammates' corpus content.
[mounts]
  source = "teammate_data"
  destination = "/data"
  initial_size = "1"
